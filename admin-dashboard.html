<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kencal — Admin Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root { --navy:#1A2744; --navy-light:#24345a; --gold:#C8A84B; --gold-light:#ddc47f; --paper:#F7F5F1; --ink:#22242b; --ink-soft:#5b5f6b; --line:#dcd9d2; --warn:#b23b3b; --ok:#2e7d4f; --radius:10px; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--paper); color:var(--ink); font-family:'Segoe UI',-apple-system,sans-serif; }
  .topbar { background:var(--navy); color:#fff; padding:18px 22px; display:flex; justify-content:space-between; align-items:center; }
  .topbar .brand { font-weight:700; font-size:15px; letter-spacing:0.02em; }
  .topbar .brand span { color:var(--gold-light); }
  .wrap { max-width:820px; margin:0 auto; padding:20px 18px 60px; }
  .card { background:#fff; border:1px solid var(--line); border-radius:var(--radius); padding:20px; margin-bottom:16px; }
  .card h2 { margin:0 0 4px; font-size:15px; color:var(--navy); }
  .card .sub { margin:0 0 14px; font-size:12.5px; color:var(--ink-soft); }
  .field { margin-bottom:12px; }
  .field label { display:block; font-size:12.5px; font-weight:600; color:var(--navy); margin-bottom:4px; }
  .field input { width:100%; padding:9px 10px; border:1px solid var(--line); border-radius:6px; font-size:14px; }
  .lang-gate { text-align:center; padding:30px 20px; }
  .lang-gate h1 { font-size:18px; color:var(--navy); margin-bottom:8px; }
  .gate-btn { display:block; width:100%; max-width:320px; margin:0 auto 10px; padding:14px; border:2px solid var(--navy); border-radius:10px; background:#fff; color:var(--navy); font-size:15px; font-weight:600; cursor:pointer; }
  .gate-btn:hover { background:var(--navy); color:#fff; }

  .filter-row { display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap; }
  .filter-btn { padding:7px 14px; border:1px solid var(--line); border-radius:20px; background:#fff; font-size:12.5px; font-weight:600; color:var(--ink-soft); cursor:pointer; }
  .filter-btn.active { background:var(--navy); color:#fff; border-color:var(--navy); }

  .candidate-row { display:flex; justify-content:space-between; align-items:center; padding:12px 14px; border:1px solid var(--line); border-radius:8px; margin-bottom:8px; cursor:pointer; }
  .candidate-row:hover { border-color:var(--gold); }
  .candidate-row .name { font-weight:600; color:var(--navy); font-size:14px; }
  .candidate-row .meta { font-size:12px; color:var(--ink-soft); margin-top:2px; }
  .status-pill { font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:0.03em; padding:3px 9px; border-radius:12px; }
  .status-applied { background:#eef1f7; color:var(--navy); }
  .status-approved { background:#fbf1da; color:#8a6a1f; }
  .status-rejected { background:#fbeeee; color:var(--warn); }
  .status-hired { background:#eaf3ff; color:#1c5fa8; }
  .status-in_person_verified { background:#eef7f1; color:var(--ok); }

  .detail-field { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #eee7d9; font-size:13.5px; }
  .detail-field b { color:var(--navy); }
  .checklist-item { display:flex; align-items:center; gap:8px; padding:6px 0; font-size:13.5px; }
  .checklist-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
  .checklist-dot.done { background:var(--ok); }
  .checklist-dot.pending { background:var(--line); }

  .btn { display:block; width:100%; border:none; border-radius:8px; padding:12px; font-size:14.5px; font-weight:600; cursor:pointer; margin-top:8px; }
  .btn-approve { background:var(--ok); color:#fff; }
  .btn-reject { background:var(--warn); color:#fff; }
  .btn-hire { background:var(--navy); color:#fff; }
  .btn-back { background:transparent; color:var(--navy); border:1px solid var(--line); }
  .result-ok { background:#eef7f1; border:1px solid #bfe3cc; color:var(--ok); padding:12px 14px; border-radius:8px; font-size:14px; font-weight:600; margin-top:14px; }
  .result-warn { background:#fbeeee; border:1px solid #ecc5c5; color:var(--warn); padding:12px 14px; border-radius:8px; font-size:14px; font-weight:600; margin-top:14px; }
  #candidateListCard, #candidateDetailCard { display:none; }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">KENCAL <span>ADMIN</span></div>
</div>

<div class="wrap">

  <div class="card" id="loginGateCard">
    <div class="lang-gate">
      <h1>Admin Login</h1>
      <div class="field" style="text-align:left; max-width:320px; margin:0 auto 10px;"><label>Email</label><input type="email" id="login_email"></div>
      <div class="field" style="text-align:left; max-width:320px; margin:0 auto 16px;"><label>Password</label><input type="password" id="login_password"></div>
      <button class="gate-btn" id="loginBtn">Log in</button>
      <p id="loginStatus" class="sub" style="margin-top:10px"></p>
    </div>
  </div>

  <div class="card" id="candidateListCard">
    <h2>Candidates</h2>
    <p class="sub">Tap a candidate to review, approve/reject, or confirm hire.</p>
    <div class="filter-row" id="filterRow">
      <button class="filter-btn active" data-status="all">All</button>
      <button class="filter-btn" data-status="applied">Applied</button>
      <button class="filter-btn" data-status="approved">Approved</button>
      <button class="filter-btn" data-status="hired">Hired</button>
      <button class="filter-btn" data-status="in_person_verified">Verified</button>
      <button class="filter-btn" data-status="rejected">Rejected</button>
    </div>
    <div id="candidateList"></div>
  </div>

  <div class="card" id="candidateDetailCard">
    <button class="btn btn-back" id="backBtn">← Back to list</button>
    <h2 id="detailName" style="margin-top:14px"></h2>
    <div id="detailFields"></div>

    <h2 style="margin-top:18px">Forms on File</h2>
    <div id="detailChecklist"></div>

    <div id="actionArea" style="margin-top:16px"></div>
    <div id="resultArea"></div>
  </div>

</div>

<script>
const SUPABASE_URL = 'https://guxemrdukpiqpawskapv.supabase.co';
const SUPABASE_KEY = 'sb_publishable_6UwA2vBI-Bw-2Kndb198hg_LkQ0vpJF';
let supabaseClient;
try { supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY); }
catch (err) { document.getElementById('loginStatus').textContent = 'Setup error: ' + (err.message || String(err)); }

let allCandidates = [];

function fmtDate(input) {
  if (!input) return '';
  const isPureDate = typeof input === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(input);
  const d = new Date(input);
  if (isNaN(d.getTime())) return input;
  // Pure "date only" values (e.g. start_date) are stored/parsed as UTC
  // midnight — reading them back with UTC methods avoids a timezone-driven
  // off-by-one-day bug. Full timestamps (e.g. approved_at) already carry
  // real offset info, so local methods give the correct calendar date.
  const mm = String((isPureDate ? d.getUTCMonth() : d.getMonth()) + 1).padStart(2, '0');
  const dd = String(isPureDate ? d.getUTCDate() : d.getDate()).padStart(2, '0');
  const yyyy = isPureDate ? d.getUTCFullYear() : d.getFullYear();
  return `${mm}/${dd}/${yyyy}`;
}
let currentFilter = 'all';
let selectedCandidate = null;

const STATUS_LABELS = {
  applied: 'Applied', approved: 'Approved', rejected: 'Rejected',
  hired: 'Hired', in_person_verified: 'Verified'
};

document.getElementById('loginBtn').addEventListener('click', async () => {
  const email = document.getElementById('login_email').value.trim();
  const password = document.getElementById('login_password').value;
  const loginStatus = document.getElementById('loginStatus');
  loginStatus.textContent = 'Logging in…';
  try {
    const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
    if (error) { loginStatus.textContent = 'Login failed: ' + error.message; return; }
    loginStatus.textContent = '';
    document.getElementById('loginGateCard').style.display = 'none';

    // If we arrived here with ?candidate_id=... in the address (from the
    // application form's "Continue" link), skip the list and go straight
    // to that candidate's detail view instead.
    const urlParams = new URLSearchParams(window.location.search);
    const preselectedId = urlParams.get('candidate_id');
    if (preselectedId) {
      await openCandidateDetail(preselectedId);
    } else {
      document.getElementById('candidateListCard').style.display = 'block';
      await loadCandidates();
    }
  } catch (err) { loginStatus.textContent = 'Unexpected error: ' + (err.message || String(err)); }
});

async function loadCandidates() {
  const { data, error } = await supabaseClient.from('candidates').select('*').order('created_at', { ascending: false });
  if (error) { document.getElementById('candidateList').innerHTML = `<div class="result-warn">${error.message}</div>`; return; }
  allCandidates = data || [];
  renderCandidateList();
}

function renderCandidateList() {
  const listEl = document.getElementById('candidateList');
  const filtered = currentFilter === 'all' ? allCandidates : allCandidates.filter(c => c.status === currentFilter);
  if (filtered.length === 0) { listEl.innerHTML = `<p class="sub">No candidates in this view.</p>`; return; }
  listEl.innerHTML = filtered.map(c => `
    <div class="candidate-row" data-id="${c.id}">
      <div>
        <div class="name">${c.last_name}, ${c.first_name}</div>
        <div class="meta">${c.state || '—'} · ${fmtDate(c.created_at)}</div>
      </div>
      <span class="status-pill status-${c.status}">${STATUS_LABELS[c.status] || c.status}</span>
    </div>
  `).join('');
  listEl.querySelectorAll('.candidate-row').forEach(row => {
    row.addEventListener('click', () => openCandidateDetail(row.dataset.id));
  });
}

document.getElementById('filterRow').addEventListener('click', (e) => {
  if (!e.target.classList.contains('filter-btn')) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  currentFilter = e.target.dataset.status;
  renderCandidateList();
});

document.getElementById('backBtn').addEventListener('click', () => {
  document.getElementById('candidateDetailCard').style.display = 'none';
  document.getElementById('candidateListCard').style.display = 'block';
  loadCandidates();
});

async function openCandidateDetail(candidateId) {
  const { data: candidate, error } = await supabaseClient.from('candidates').select('*').eq('id', candidateId).single();
  if (error) { alert('Could not load candidate: ' + error.message); return; }
  selectedCandidate = candidate;

  document.getElementById('candidateListCard').style.display = 'none';
  document.getElementById('candidateDetailCard').style.display = 'block';
  document.getElementById('resultArea').innerHTML = '';

  document.getElementById('detailName').textContent = `${candidate.last_name}, ${candidate.first_name}`;
  document.getElementById('detailFields').innerHTML = `
    <div class="detail-field"><span>Status</span><b><span class="status-pill status-${candidate.status}">${STATUS_LABELS[candidate.status] || candidate.status}</span></b></div>
    <div class="detail-field"><span>State</span><b>${candidate.state || '—'}</b></div>
    <div class="detail-field"><span>Phone</span><b>${candidate.phone || '—'}</b></div>
    <div class="detail-field"><span>Applied</span><b>${fmtDate(candidate.created_at)}</b></div>
    ${candidate.approved_at ? `<div class="detail-field"><span>Approved</span><b>${fmtDate(candidate.approved_at)}</b></div>` : ''}
    ${candidate.hired_at ? `<div class="detail-field"><span>Hired</span><b>${fmtDate(candidate.hired_at)}</b></div>` : ''}
    ${candidate.start_date ? `<div class="detail-field"><span>Start Date</span><b>${fmtDate(candidate.start_date)}</b></div>` : ''}
    <div class="detail-field">
      <span>Employing Entity</span>
      <select id="employingEntitySelect" style="font-weight:600; border:1px solid var(--line); border-radius:6px; padding:4px 8px;">
        <option value="KMC" ${candidate.employing_entity === 'KMC' ? 'selected' : ''}>Kencal Maintenance Corp. (KMC)</option>
        <option value="KP" ${candidate.employing_entity === 'KP' ? 'selected' : ''}>Kencal Painting LLC</option>
        <option value="KCM" ${candidate.employing_entity === 'KCM' ? 'selected' : ''}>Kencal Commercial Maintenance Corp.</option>
      </select>
    </div>
  `;
  document.getElementById('employingEntitySelect').addEventListener('change', async (e) => {
    const { error } = await supabaseClient.from('candidates').update({ employing_entity: e.target.value }).eq('id', candidateId);
    if (error) alert('Could not update employing entity: ' + error.message);
  });

  await loadChecklist(candidateId, candidate.state);
  renderActionArea(candidate);
}

const STATE_FORM_MAP = {
  NY: ['ny_it2104', 'NY IT-2104'],
  CT: ['ct_w4', 'CT-W4'],
  NJ: ['nj_w4', 'NJ-W4']
};

async function loadChecklist(candidateId, candidateState) {
  const stateForm = STATE_FORM_MAP[candidateState] || null;

  const tables = [
    ['applications', 'Application'],
    ['i9_section1', 'I-9 Section 1'],
    ['w4_federal', 'Federal W-4'],
    ...(stateForm ? [stateForm] : []),
    ['policy_acknowledgments', 'Policy Acknowledgments'],
    ['i9_section2', 'I-9 Section 2 (Document Verification)']
  ];
  const results = await Promise.all(tables.map(([table]) =>
    supabaseClient.from(table).select('candidate_id', { count: 'exact', head: true }).eq('candidate_id', candidateId)
  ));
  let html = tables.map(([table, label], i) => {
    const done = (results[i].count || 0) > 0;
    return `<div class="checklist-item"><span class="checklist-dot ${done ? 'done' : 'pending'}"></span>${label}</div>`;
  }).join('');
  if (!stateForm) {
    html += `<div class="checklist-item"><span class="checklist-dot pending"></span>No state withholding form built yet for "${candidateState || 'unknown'}"</div>`;
  }
  document.getElementById('detailChecklist').innerHTML = html;
}

function renderActionArea(candidate) {
  const area = document.getElementById('actionArea');
  if (candidate.status === 'applied') {
    area.innerHTML = `
      <button class="btn btn-approve" id="approveBtn">✓ Approve — qualifies to be hired</button>
      <button class="btn btn-reject" id="rejectBtn">✗ Reject</button>
    `;
    document.getElementById('approveBtn').addEventListener('click', () => updateStatus(candidate.id, 'approved'));
    document.getElementById('rejectBtn').addEventListener('click', () => updateStatus(candidate.id, 'rejected'));
  } else if (candidate.status === 'approved') {
    area.innerHTML = `
      <a class="btn btn-hire" style="text-decoration:none; display:block; text-align:center;" href="i9-section1.html?candidate_id=${candidate.id}">Continue to I-9 Section 1 →</a>
      <p class="sub" style="margin:14px 0 6px; padding-top:10px; border-top:1px solid var(--line);">Once a real start date is confirmed (this can happen later, administratively):</p>
      <div class="field"><label>Confirmed start date</label><input type="date" id="startDateInput"></div>
      <button class="btn btn-hire" id="hireBtn">Confirm Hire — set date on all forms</button>
    `;
    document.getElementById('hireBtn').addEventListener('click', () => confirmHire(candidate.id));
  } else if (candidate.status === 'hired') {
    area.innerHTML = `
      <p class="sub">Hire confirmed — all completed forms have been dated.</p>
      <a class="btn btn-hire" style="text-decoration:none; display:block; text-align:center;" href="i9-section2-verification.html?candidate_id=${candidate.id}">If I-9 Section 2 wasn't done yet, complete it now →</a>
    `;
  } else if (candidate.status === 'in_person_verified') {
    area.innerHTML = `<p class="sub" style="color:var(--ok); font-weight:600;">✓ Fully onboarded.</p>`;
  } else if (candidate.status === 'rejected') {
    area.innerHTML = `<p class="sub">This candidate was rejected.</p>`;
  }
}

async function updateStatus(candidateId, newStatus) {
  const resultArea = document.getElementById('resultArea');
  resultArea.innerHTML = '<div class="sub">Saving…</div>';
  const { error } = await supabaseClient.from('candidates').update({ status: newStatus }).eq('id', candidateId);
  if (error) {
    resultArea.innerHTML = `<div class="result-warn">${error.message}</div>`;
    return;
  }
  resultArea.innerHTML = `<div class="result-ok">✓ Candidate marked ${newStatus}.</div>`;
  await openCandidateDetail(candidateId);
}

async function confirmHire(candidateId) {
  const resultArea = document.getElementById('resultArea');
  const startDate = document.getElementById('startDateInput').value;
  if (!startDate) { resultArea.innerHTML = '<div class="result-warn">Please pick a start date.</div>'; return; }

  resultArea.innerHTML = '<div class="sub">Confirming hire and dating all forms…</div>';

  try {
    // 1. Move status to 'hired' and record the start date
    const { error: statusErr } = await supabaseClient.from('candidates')
      .update({ status: 'hired', start_date: startDate })
      .eq('id', candidateId);
    if (statusErr) throw new Error('Status update failed: ' + statusErr.message);

    // 2. Cascade form_date onto every form table that has a row for this
    // candidate — this is the digital equivalent of finally writing the
    // date on the paper packet once hire is confirmed. i9_section2 also
    // gets its first_day_of_employment field set at the same time, since
    // that field is separate from form_date but should carry the same date.
    const formTables = ['i9_section1', 'w4_federal', 'ny_it2104', 'ct_w4', 'nj_w4', 'policy_acknowledgments'];
    for (const table of formTables) {
      const { error } = await supabaseClient.from(table).update({ form_date: startDate }).eq('candidate_id', candidateId);
      if (error) throw new Error(`Dating ${table} failed: ` + error.message);
    }
    const { error: i9s2Err } = await supabaseClient.from('i9_section2')
      .update({ form_date: startDate, first_day_of_employment: startDate })
      .eq('candidate_id', candidateId);
    if (i9s2Err) throw new Error('Dating i9_section2 failed: ' + i9s2Err.message);

    resultArea.innerHTML = `<div class="result-ok">✓ Hire confirmed. All forms dated ${fmtDate(startDate)}.</div>`;
    await openCandidateDetail(candidateId);
  } catch (err) {
    resultArea.innerHTML = `<div class="result-warn">${err.message || String(err)}</div>`;
  }
}
</script>

</body>
</html>
