<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kencal — WinTeam Entry Summary</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root { --navy:#1A2744; --navy-light:#24345a; --gold:#C8A84B; --gold-light:#ddc47f; --paper:#F7F5F1; --ink:#22242b; --ink-soft:#5b5f6b; --line:#dcd9d2; --warn:#b23b3b; --ok:#2e7d4f; --radius:10px; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--paper); color:var(--ink); font-family:'Segoe UI',-apple-system,sans-serif; }
  .topbar { background:var(--navy); color:#fff; padding:18px 22px; display:flex; justify-content:space-between; align-items:center; }
  .topbar .brand { font-weight:700; font-size:15px; letter-spacing:0.02em; }
  .topbar .brand span { color:var(--gold-light); }
  .wrap { max-width:640px; margin:0 auto; padding:20px 18px 60px; }
  .card { background:#fff; border:1px solid var(--line); border-radius:var(--radius); padding:20px; margin-bottom:16px; }
  .card h2 { margin:0 0 4px; font-size:15px; color:var(--navy); }
  .card .sub { margin:0 0 14px; font-size:12.5px; color:var(--ink-soft); }
  .field { margin-bottom:12px; }
  .field label { display:block; font-size:12.5px; font-weight:600; color:var(--navy); margin-bottom:4px; }
  .field input, .field select { width:100%; padding:9px 10px; border:1px solid var(--line); border-radius:6px; font-size:14px; }
  .lang-gate { text-align:center; padding:30px 20px; }
  .lang-gate h1 { font-size:18px; color:var(--navy); margin-bottom:8px; }
  .gate-btn { display:block; width:100%; max-width:320px; margin:0 auto 10px; padding:14px; border:2px solid var(--navy); border-radius:10px; background:#fff; color:var(--navy); font-size:15px; font-weight:600; cursor:pointer; }
  .gate-btn:hover { background:var(--navy); color:#fff; }
  .btn { display:block; width:100%; background:var(--navy); color:#fff; border:none; border-radius:8px; padding:13px; font-size:15px; font-weight:600; cursor:pointer; margin-top:6px; }
  .btn:hover { background:var(--navy-light); }
  .progress-bar { height:8px; background:#eee7d9; border-radius:4px; overflow:hidden; margin-bottom:6px; }
  .progress-fill { height:100%; background:var(--gold); transition:width .3s ease; }
  .progress-label { font-size:12px; color:var(--ink-soft); margin-bottom:16px; }

  .wt-row {
    display:grid; grid-template-columns: 34px 1fr 1fr; align-items:center; gap:12px;
    padding:11px 0; border-bottom:1px solid #eee7d9;
  }
  .wt-row:last-child { border-bottom:none; }
  .wt-num { font-size:11px; font-weight:700; color:var(--gold); }
  .wt-label { font-size:12.5px; font-weight:600; color:var(--ink-soft); text-transform:uppercase; letter-spacing:0.02em; }
  .wt-value { font-size:15px; font-weight:600; color:var(--navy); text-align:right; }
  .wt-value.missing { color:var(--warn); font-weight:500; font-style:italic; font-size:13px; }

  #printBtn { margin-top:10px; }

  @media print {
    .topbar, #loginGateCard, #candidateGateCard, .no-print { display:none !important; }
    body { background:#fff; }
    .card { border:none; box-shadow:none; padding:0; margin-bottom:20px; }
    .progress-bar, .progress-label { display:none; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">KENCAL <span>ONBOARDING</span></div>
</div>

<div class="wrap">

  <div class="card" id="loginGateCard">
    <div class="lang-gate">
      <h1>Staff Login</h1>
      <div class="field" style="text-align:left; max-width:320px; margin:0 auto 10px;"><label>Email</label><input type="email" id="login_email"></div>
      <div class="field" style="text-align:left; max-width:320px; margin:0 auto 16px;"><label>Password</label><input type="password" id="login_password"></div>
      <button class="gate-btn" id="loginBtn">Log in</button>
      <p id="loginStatus" class="sub" style="margin-top:10px"></p>
    </div>
  </div>

  <div class="card" id="candidateGateCard" style="display:none">
    <h2>Select a candidate</h2>
    <p class="sub">Shows what's filled in so far — and doubles as your WinTeam typing reference once everything's complete.</p>
    <select id="candidateSelect" style="width:100%; padding:10px; border:1px solid var(--line); border-radius:8px; font-size:14px;">
      <option value="">Loading candidates…</option>
    </select>
  </div>

  <div class="card" id="summaryCard" style="display:none">
    <h2 id="candidateName"></h2>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="progress-label" id="progressLabel"></div>
    <div id="wtFields"></div>
    <button class="btn no-print" id="printBtn">Print / Save as PDF</button>
  </div>

</div>

<script>
const SUPABASE_URL = 'https://guxemrdukpiqpawskapv.supabase.co';
const SUPABASE_KEY = 'sb_publishable_6UwA2vBI-Bw-2Kndb198hg_LkQ0vpJF';
let supabaseClient;
try { supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY); }
catch (err) { document.getElementById('loginStatus').textContent = 'Setup error: ' + (err.message || String(err)); }

let selectedCandidateId = null;

document.getElementById('loginBtn').addEventListener('click', async () => {
  const email = document.getElementById('login_email').value.trim();
  const password = document.getElementById('login_password').value;
  const loginStatus = document.getElementById('loginStatus');
  loginStatus.textContent = 'Logging in…';
  try {
    const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
    if (error) { loginStatus.textContent = 'Login failed: ' + error.message; return; }
    loginStatus.textContent = '';
    document.getElementById('loginGateCard').style.display = 'none';
    await loadCandidates();

    const urlParams = new URLSearchParams(window.location.search);
    const preselectedId = urlParams.get('candidate_id');
    if (preselectedId) {
      document.getElementById('candidateSelect').value = preselectedId;
      await selectCandidate(preselectedId);
    } else {
      document.getElementById('candidateGateCard').style.display = 'block';
    }
  } catch (err) { loginStatus.textContent = 'Unexpected error: ' + (err.message || String(err)); }
});

async function loadCandidates() {
  const select = document.getElementById('candidateSelect');
  const { data, error } = await supabaseClient.from('candidates').select('id, first_name, last_name, status, created_at').order('created_at', { ascending: false }).limit(100);
  if (error) { select.innerHTML = `<option value="">Error: ${error.message}</option>`; return; }
  if (!data || data.length === 0) { select.innerHTML = `<option value="">No candidates found</option>`; return; }
  select.innerHTML = `<option value="">Select a candidate…</option>` + data.map(c => `<option value="${c.id}">${c.last_name}, ${c.first_name} — ${c.status}</option>`).join('');
}

document.getElementById('candidateSelect').addEventListener('change', (e) => selectCandidate(e.target.value));

const CITIZENSHIP_LABELS = {
  us_citizen: 'U.S. Citizen',
  noncitizen_national: 'Noncitizen National',
  lawful_permanent_resident: 'Lawful Permanent Resident',
  alien_authorized_to_work: 'Alien Authorized to Work'
};
const FILING_STATUS_LABELS = {
  single: 'Single',
  married_filing_jointly: 'Married',
  head_of_household: 'Head of Household'
};

function fmtDate(iso) {
  if (!iso) return '';
  const m = String(iso).match(/^(\d{4})-(\d{2})-(\d{2})/);
  return m ? `${m[2]}/${m[3]}/${m[1]}` : iso;
}

function wtRow(num, label, value) {
  const empty = !value || String(value).trim() === '';
  return `<div class="wt-row">
    <div class="wt-num">${num}</div>
    <div class="wt-label">${label}</div>
    <div class="wt-value ${empty ? 'missing' : ''}">${empty ? 'Not yet on file' : value}</div>
  </div>`;
}

async function selectCandidate(candidateId) {
  selectedCandidateId = candidateId;
  if (!selectedCandidateId) return;

  const { data: candidate } = await supabaseClient.from('candidates').select('*').eq('id', candidateId).single();
  const { data: application } = await supabaseClient.from('applications').select('*').eq('candidate_id', candidateId).single();
  const { data: i9 } = await supabaseClient.from('i9_section1').select('*').eq('candidate_id', candidateId).single();
  const { data: w4 } = await supabaseClient.from('w4_federal').select('*').eq('candidate_id', candidateId).single();

  document.getElementById('candidateGateCard').style.display = 'none';
  document.getElementById('summaryCard').style.display = 'block';
  document.getElementById('candidateName').textContent = candidate ? `${candidate.last_name}, ${candidate.first_name}` : 'Candidate';

  // Prefer the most current source for each field: I-9 Section 1 first
  // (most recently confirmed), falling back to the application.
  const ssn = (i9 && i9.ssn) || (application && application.ssn) || '';
  const first = candidate ? candidate.first_name : '';
  const middle = candidate ? candidate.middle_name : '';
  const last = candidate ? candidate.last_name : '';
  const addr1 = (i9 && i9.address) || (application && application.street_address) || '';
  const addr2 = (i9 && i9.address_2) || (application && application.apt_number) || '';
  const city = (i9 && i9.city) || (application && application.city) || '';
  const state = (i9 && i9.state) || (application && application.state) || '';
  const zip = (i9 && i9.zip) || (application && application.zip) || '';
  const phone = (i9 && i9.phone) || (application && application.phone) || '';
  const dob = i9 ? fmtDate(i9.date_of_birth) : '';
  const i9Exp = i9 ? fmtDate(i9.work_authorization_expiration) : '';
  const i9Type = (i9 && i9.citizenship_status) ? CITIZENSHIP_LABELS[i9.citizenship_status] || i9.citizenship_status : '';
  const maritalStatus = (w4 && w4.filing_status) ? FILING_STATUS_LABELS[w4.filing_status] || w4.filing_status : '';
  const dependentsCount = w4 ? (Number(w4.qualifying_children_count || 0) + Number(w4.other_dependents_count || 0)) : null;
  const dependentsDisplay = dependentsCount === null ? '' : String(dependentsCount);

  const fieldsHtml =
    wtRow(1, 'Social Security Number', ssn) +
    wtRow(2, 'First Name', first) +
    wtRow(3, 'Middle', middle) +
    wtRow(4, 'Last Name', last) +
    wtRow(5, 'Address 1', addr1) +
    wtRow(6, 'Address 2', addr2) +
    wtRow(7, 'City', city) +
    wtRow(8, 'State', state) +
    wtRow(9, 'Zip Code', zip) +
    wtRow(10, 'Telephone #', phone) +
    wtRow(11, 'Birth Date', dob) +
    wtRow(12, 'I-9 Expiration Date', i9Exp) +
    wtRow(13, 'I-9 Type', i9Type) +
    wtRow(14, 'Marital Status', maritalStatus) +
    wtRow(15, 'Dependents', dependentsDisplay);

  document.getElementById('wtFields').innerHTML = fieldsHtml;

  const allValues = [ssn, first, last, addr1, city, state, zip, phone, dob, i9Exp, i9Type, maritalStatus, dependentsDisplay];
  const filledCount = allValues.filter(v => v && String(v).trim() !== '').length;
  const pct = Math.round((filledCount / allValues.length) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${filledCount} of ${allValues.length} fields on file (${pct}%)`;
}

document.getElementById('printBtn').addEventListener('click', () => window.print());
</script>

</body>
</html>
